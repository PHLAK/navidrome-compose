services:

  navidrome:
    image: deluan/navidrome:${NAVIDROME_VERSION:-latest}
    user: ${HOST_USER_ID:-0}:${HOST_GROUP_ID:-0}
    env_file: environment.d/navidrome.env
    ports:
      - ${NAVIDROME_PORT:-4533}:4533
    volumes:
      - ${NAVIDROME_DATA_PATH:-./data}:/var/www/html/data
      - ${MUSIC_PATH}:/music:ro
      - /etc/localtime:/etc/localtime:ro
    restart: unless-stopped

  watchtower:
    image: containrrr/watchtower:${WATCHTOWER_VERSION:-latest}
    env_file: environment.d/watchtower.env
    environment:
      WATCHTOWER_SCOPE: ${COMPOSE_PROJECT_NAME}
    volumes:
      - ${DOCKER_SOCKET:-/var/run/docker.sock}:/var/run/docker.sock
      - /etc/localtime:/etc/localtime:ro
    labels:
      com.centurylinklabs.watchtower.scope: ${COMPOSE_PROJECT_NAME}
    restart: unless-stopped

volumes:
  navidrome-cache: {}
